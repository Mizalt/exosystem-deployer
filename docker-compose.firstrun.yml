# --- docker-compose.firstrun.yml ---
# Первичный доступ к панели (ADR-014). Применяется install.sh ТОЛЬКО пока домен
# панели не задан: публикует порт деплоера наружу, чтобы войти в панель по
# http://<IP-сервера>:7999 и задать домен (иначе панель за catchall-403 —
# замкнутый круг). После задания домена доступ закрывается:
#   sh close-initial-access.sh   (пересоздаёт deployer без публикации порта).
#
# ВНИМАНИЕ: открывает панель по голому IP без TLS (вход защищён JWT). Закрывайте
# доступ сразу после онбординга. Более безопасная альтернатива — SSH-туннель
# (ssh -L 7999:localhost:7999 user@server) вместо публикации порта.
services:
  deployer:
    ports:
      - "0.0.0.0:7999:7999"
