name: CI

# Линт + тесты на каждый push и pull request. Гейт качества перед публичным
# пушем (репозиторий публичный — см. docs/06_AGENT_SECURITY.md).

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # Блокирующий линт: только критичные классы ошибок (синтаксис, неопределённые
      # имена, битые сравнения) — ловит реальные баги, не падает на стиле.
      - name: Lint (critical errors)
        run: ruff check . --select E9,F63,F7,F82

      # Информативный полный прогон линтера — не блокирует сборку.
      - name: Lint (full, non-blocking)
        run: ruff check . --exit-zero

      - name: Run tests
        run: pytest
